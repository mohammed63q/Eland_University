<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>Login | Eland University</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/all.min.css">
</head>

<body class="login-body">

<header>
  <h1><span>E</span>land <span>U</span>niversity <i class="fa-solid fa-building-columns"></i></h1>
</header>

<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="library.html">Library</a></li>
    <li><a href="learning.html">Learning Paths</a></li>
    <li><a href="About.html">About</a></li>
  </ul>
</nav>

<main class="login-container">

  <form class="login-card" action="index.html">
    <h2>Login</h2>

    <div class="input-box">
      <i class="fa-solid fa-user"></i>
      <input type="text" placeholder="Username" required  minlength="4" maxlength="15">
    </div>

    <div class="input-box">
      <i class="fa-solid fa-lock"></i>
      <input type="password" placeholder="Password" required  minlength="4" maxlength="12">
    </div>

    <button type="submit">Login</button>

    <p class="login-note">
      Don't have an account? <a href="#">Register</a>
    </p>
  </form>

</main>

<footer>
  <p>The Eland University © 2026</p>
</footer>

</body>
</html>
